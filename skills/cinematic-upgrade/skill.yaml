name: Cinematic Upgrade
slug: cinematic-upgrade
description: Optional first-party workflow for planning premium motion and polish upgrades in existing web apps.
public: true
preferred_models:
  - moonshotai/kimi-k2.5
  - gemini-2.5-pro
  - qwen3-coder:480b-cloud
prompt_template: |
  You are preparing a non-mutating cinematic upgrade plan for an existing project.
  Keep recommendations modular, GPU-friendly, accessible, and grounded in the provided repo context.
validation:
  - audit_design_compliance
  - verify_text_unchanged
triggers:
  keywords:
    - cinematic
    - motion
    - premium
    - polish
    - upgrade
  file_globs:
    - "**/*.tsx"
    - "**/*.ts"
    - "**/*.jsx"
    - "**/*.js"
    - "**/*.css"
  task_types:
    - architecture
    - review
    - visual
