name: Feature request
description: Suggest a new MCP capability, skill, or marketplace improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature, skill, or workflow you want
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should this be tested or validated?
